# Server
server.port=8080

# Max file upload size (NID images can be large)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# NID Extractor config (put your values here)
nid.extractor.engine=TESSERACT
nid.extractor.claude-api-key=
nid.extractor.tess-data-path=/opt/homebrew/share/tessdata
nid.extractor.preprocess-image=true